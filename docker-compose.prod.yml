# Production Docker Compose for AICR
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Required environment variables (create .env file):
#   API_PORT      - Backend port (default: 3000)
#   WEB_PORT      - Frontend port (default: 3001)
#   CORS_ORIGIN   - Frontend URL for CORS (e.g., https://aicr.example.com)
#   VITE_API_URL  - Backend URL for frontend (e.g., https://api.aicr.example.com)
#   BETTER_AUTH_URL - Public URL of this API (same as VITE_API_URL)

version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        API_PORT: ${API_PORT:-3000}
    ports:
      - "${API_PORT:-3000}:${API_PORT:-3000}"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_AUTH_TOKEN=${DATABASE_AUTH_TOKEN}
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
      - KLAP_API_KEY=${KLAP_API_KEY}
      - KLAP_API_URL=${KLAP_API_URL:-https://api.klap.app/v2}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - PORT=${API_PORT:-3000}
      # DNS resolution for external APIs
      - DNS=1.1.1.1
    restart: unless-stopped
    # Use host network for external API access (Dokploy compatibility)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT:-3000}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        WEB_PORT: ${WEB_PORT:-3000}
    ports:
      - "${WEB_PORT:-3001}:${WEB_PORT:-3000}"
    environment:
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
